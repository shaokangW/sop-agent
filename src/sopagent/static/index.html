<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>sop-agent</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#c9d1d9; --muted:#8b949e; --accent:#1f6feb; --green:#2ea043; --red:#f85149; --yellow:#d29922; --cyan:#39c5cf; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; }
  #sidebar { width:260px; background:var(--panel); border-right:1px solid var(--border); padding:16px; overflow-y:auto; flex-shrink:0; }
  #sidebar h2 { font-size:.85rem; color:var(--muted); text-transform:uppercase; margin:16px 0 8px; }
  #sidebar h2:first-child { margin-top:0; }
  .info-row { display:flex; justify-content:space-between; font-size:.85rem; padding:4px 0; }
  .info-row .k { color:var(--muted); }
  .info-row .v { color:var(--text); font-family:ui-monospace,monospace; }
  .tool-stat { display:flex; justify-content:space-between; font-size:.8rem; padding:3px 0; }
  .tool-stat .name { color:var(--cyan); }
  .tool-stat .count { color:var(--muted); }
  #session-list .s-item { padding:6px 8px; border-radius:4px; cursor:pointer; font-size:.82rem; color:var(--text); margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #session-list .s-item:hover { background:#21262d; }
  #session-list .s-item.active { background:var(--accent); color:#fff; }
  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #tabs { display:flex; gap:4px; padding:8px 16px; background:var(--panel); border-bottom:1px solid var(--border); }
  .tab { padding:8px 16px; border-radius:6px; cursor:pointer; font-size:.85rem; color:var(--muted); }
  .tab.active { background:var(--accent); color:#fff; }
  #messages { flex:1; overflow-y:auto; padding:24px; max-width:900px; margin:0 auto; width:100%; }
  .msg { margin-bottom:20px; display:flex; flex-direction:column; }
  .msg.user { align-items:flex-end; }
  .msg.assistant { align-items:flex-start; }
  .bubble { max-width:85%; padding:12px 16px; border-radius:10px; line-height:1.6; word-break:break-word; }
  .msg.user .bubble { background:#1f2c3d; color:var(--cyan); border-bottom-right-radius:2px; font-weight:500; }
  .msg.assistant .bubble { background:var(--panel); border:1px solid var(--border); border-bottom-left-radius:2px; }
  .bubble p { margin:6px 0; }
  .bubble code { background:#21262d; padding:1px 5px; border-radius:3px; font-size:.85em; color:var(--yellow); }
  .bubble pre { background:#010409; border:1px solid var(--border); padding:12px; border-radius:6px; overflow-x:auto; margin:8px 0; }
  .bubble pre code { background:none; color:var(--text); padding:0; }
  .bubble h1,.bubble h2,.bubble h3 { margin:10px 0 6px; }
  .bubble ul,.bubble ol { margin:6px 0 6px 22px; }
  .role-tag { font-size:.7rem; color:var(--muted); margin-bottom:4px; text-transform:uppercase; }
  .reasoning { background:#161b22; border-left:3px solid var(--muted); padding:8px 12px; margin:6px 0 8px; border-radius:4px; color:var(--muted); font-style:italic; font-size:.82rem; line-height:1.5; white-space:pre-wrap; max-height:200px; overflow-y:auto; }
  .reasoning::before { content:'think'; display:inline-block; background:var(--muted); color:var(--bg); padding:1px 8px; border-radius:8px; font-style:normal; font-weight:700; margin-bottom:6px; font-size:.7rem; }
  /* tool group: collapsed summary box */
  .tool-group { background:#0d1117; border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:6px; margin:8px 0; max-width:85%; }
  .tool-group-header { display:flex; align-items:center; gap:8px; padding:8px 12px; cursor:pointer; font-size:.85rem; }
  .tool-group-header .icon { font-size:1rem; }
  .tool-group-header .title { color:var(--accent); font-weight:600; }
  .tool-group-header .count { color:var(--muted); margin-left:auto; font-size:.8rem; }
  .tool-group-header .arrow { color:var(--muted); transition:transform .15s; }
  .tool-group.expanded .tool-group-header .arrow { transform:rotate(90deg); }
  .tool-list { display:none; padding:0 8px 8px; }
  .tool-group.expanded .tool-list { display:block; }
  .tool-item { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:4px; cursor:pointer; font-size:.82rem; }
  .tool-item:hover { background:#161b22; }
  .tool-item .icon { font-size:.95rem; }
  .tool-item .name { color:var(--cyan); font-family:ui-monospace,monospace; }
  .tool-item .status { margin-left:auto; font-size:.78rem; }
  .tool-item .status.ok { color:var(--green); }
  .tool-item .status.fail { color:var(--red); }
  .tool-detail { display:none; margin:4px 0 8px 8px; padding:8px; background:#010409; border:1px solid var(--border); border-radius:4px; }
  .tool-item.expanded .tool-detail { display:block; }
  .tool-detail pre { color:var(--muted); font-size:.76rem; white-space:pre-wrap; max-height:180px; overflow-y:auto; }
  .approval { background:#2d2200; border:1px solid var(--yellow); border-radius:8px; padding:12px; margin:12px 0; max-width:85%; }
  .approval .reason { color:var(--yellow); font-weight:600; margin-bottom:8px; }
  .approval pre { background:#000; padding:8px; border-radius:4px; font-size:.8rem; margin:6px 0; overflow-x:auto; }
  .approval button { padding:6px 16px; margin-right:8px; border:none; border-radius:4px; cursor:pointer; font-weight:600; }
  .approval .yes { background:var(--green); color:#fff; }
  .approval .no { background:var(--red); color:#fff; }
  #input-bar { border-top:1px solid var(--border); padding:16px; background:var(--panel); }
  #input-bar .input-row { display:flex; gap:8px; max-width:900px; margin:0 auto; }
  #task-input { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:12px; border-radius:8px; font-size:.9rem; font-family:inherit; }
  #task-input:focus { outline:none; border-color:var(--accent); }
  #send-btn { background:var(--accent); color:#fff; border:none; padding:0 20px; border-radius:8px; cursor:pointer; font-weight:600; }
  #send-btn:disabled { opacity:.5; }
  #sop-yaml { flex:1; height:100px; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:10px; border-radius:8px; font-family:ui-monospace,monospace; font-size:.82rem; resize:vertical; }
  #sop-yaml:focus { outline:none; border-color:var(--accent); }
  #run-sop { background:var(--accent); color:#fff; border:none; padding:0 20px; border-radius:8px; cursor:pointer; font-weight:600; align-self:stretch; }
  #sop-bar { display:none; padding:16px; border-bottom:1px solid var(--border); background:var(--panel); }
  #sop-bar textarea { width:100%; height:120px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:10px; font-family:ui-monospace,monospace; font-size:.82rem; }
  #sop-bar button { margin-top:8px; background:var(--accent); color:#fff; border:none; padding:8px 20px; border-radius:8px; cursor:pointer; }
  .streaming { border-left:2px solid var(--accent); padding-left:8px; }
</style>
</head>
<body>
<aside id="sidebar">
  <h2>会话 <button id="new-session" style="float:right;background:var(--accent);color:#fff;border:none;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:.75rem;">+ 新建</button></h2>
  <div id="session-list" style="margin-bottom:12px;"></div>
  <h2>模型</h2>
  <div class="info-row"><span class="k">Provider</span><span class="v" id="m-provider">—</span></div>
  <div class="info-row"><span class="k">Model</span><span class="v" id="m-model">—</span></div>
  <h2>本次运行</h2>
  <div class="info-row"><span class="k">模式</span><span class="v" id="s-mode">对话</span></div>
  <div class="info-row"><span class="k">状态</span><span class="v" id="s-status">空闲</span></div>
  <div class="info-row"><span class="k">轮次</span><span class="v" id="s-turns">0</span></div>
  <div class="info-row"><span class="k">工具调用</span><span class="v" id="s-tools-total">0</span></div>
  <h2>工具使用</h2>
  <div id="tool-stats"><div class="tool-stat"><span class="name">—</span></div></div>
  <h2>已加载工具</h2>
  <div id="config-tools" style="font-size:.76rem;color:var(--muted);"></div>
  <h2>MCP 服务</h2>
  <div id="config-mcp" style="font-size:.76rem;color:var(--muted);"></div>
</aside>
<main id="main">
  <div id="tabs">
    <div class="tab active" data-mode="chat">💬 对话</div>
    <div class="tab" data-mode="task">🎯 任务</div>
    <div class="tab" data-mode="sop">📋 SOP</div>
  </div>
  <div id="messages"></div>
  <div id="input-bar">
    <form id="task-form" class="input-row">
      <input id="task-input" placeholder="输入消息回车发送" autocomplete="off">
      <button id="send-btn" type="submit" disabled>发送</button>
    </form>
    <div id="sop-input" class="input-row" style="display:none">
      <textarea id="sop-yaml" placeholder="粘贴 SOP YAML（metadata/llm_defaults/stages/...）"></textarea>
      <button id="run-sop" type="button">运行 SOP</button>
    </div>
  </div>
</main>
<script>
const TOOL_ICONS = { read_file:'📄', write_file:'✏️', edit_file:'🔧', list_dir:'📂', grep:'🔍', bash:'💻', web_fetch:'🌐', todo_write:'✅', echo:'🔁', finish:'🏁', plan:'📋', subgoal_done:'✔️' };
const $ = s => document.querySelector(s);
let mode = 'chat';
let sessionId = null, taskId = null, pollTimer = null, offset = 0;
let turns = 0, toolsTotal = 0, toolCounts = {};
let curAssistant = null, curText = '', curReasoning = '', curReasoningEl = null;
let curToolGroup = null, curToolList = null;  // current turn's tool group
marked.setOptions({ breaks:true, gfm:true });

// tabs
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  if (pollTimer) return;  // don't switch mid-run
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  mode = t.dataset.mode;
  $('#s-mode').textContent = mode === 'chat' ? '对话' : mode === 'task' ? '任务' : 'SOP';
  $('#task-form').style.display = mode === 'sop' ? 'none' : '';
  $('#sop-input').style.display = mode === 'sop' ? '' : 'none';
  $('#messages').innerHTML = '';
  resetTurn();
  if (mode === 'chat' && !sessionId) startChatSession();
  $('#send-btn').disabled = mode === 'sop' || mode === 'task' ? (mode === 'task' ? false : true) : false;
}));

async function startChatSession() {
  try {
    const r = await (await fetch('/chat/start', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({approve_all_tools:false})})).json();
    sessionId = r.session_id;
    $('#m-provider').textContent = r.model.provider;
    $('#m-model').textContent = r.model.model;
    $('#send-btn').disabled = false;
    loadSessions();
  } catch (e) { $('#s-status').textContent = '连接失败'; }
}
async function loadSessions() {
  try {
    const list = await (await fetch('/chat/sessions')).json();
    const el = $('#session-list'); el.innerHTML = '';
    for (const s of list) {
      const d = document.createElement('div'); d.className = 's-item' + (s.id===sessionId?' active':'');
      d.textContent = s.title;
      d.title = new Date(s.created_at*1000).toLocaleString();
      d.onclick = () => switchSession(s.id);
      el.appendChild(d);
    }
  } catch (e) {}
}
async function newSession() {
  if (pollTimer) return;
  const r = await (await fetch('/chat/start', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({approve_all_tools:false})})).json();
  sessionId = r.session_id;
  $('#m-provider').textContent = r.model.provider; $('#m-model').textContent = r.model.model;
  $('#messages').innerHTML = ''; resetTurn();
  turns=0; toolsTotal=0; toolCounts={}; updateStats();
  loadSessions();
}
async function switchSession(id) {
  if (pollTimer) return;
  sessionId = id;
  $('#messages').innerHTML = ''; resetTurn();
  turns=0; toolsTotal=0; toolCounts={}; updateStats();
  try {
    const r = await (await fetch(`/chat/${id}/history`)).json();
    for (const m of r.messages) addMsg(m.role, m.content);
  } catch (e) {}
  loadSessions();
}
startChatSession();
$('#new-session').onclick = newSession;
(async function loadConfig() {
  try {
    const r = await (await fetch('/config')).json();
    const tc = $('#config-tools'); tc.innerHTML = '';
    for (const t of r.builtin_tools) {
      const d = document.createElement('div'); d.style.padding='2px 0';
      d.innerHTML = `<span style="color:var(--cyan)">${TOOL_ICONS[t.name]||'⚙️'} ${t.name}</span>${t.requires_approval?' <span style="color:var(--yellow)">需审批</span>':''}`;
      tc.appendChild(d);
    }
    const mc = $('#config-mcp'); mc.innerHTML = '';
    const servers = Object.entries(r.mcp_servers);
    if (!servers.length) { mc.innerHTML = '<div>无（在 ~/.sop-agent/mcp.json 配置）</div>'; }
    for (const [id, cfg] of servers) {
      const d = document.createElement('div'); d.style.padding='2px 0';
      d.innerHTML = `<span style="color:var(--accent)">${id}</span> <span style="color:var(--muted)">${cfg.command||cfg.url||''} ${(cfg.args||[]).join(' ')}</span>`;
      mc.appendChild(d);
    }
  } catch (e) {}
})();

$('#task-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = $('#task-input').value.trim();
  if (!text) return;
  $('#task-input').value = '';
  $('#send-btn').disabled = true;
  addMsg('user', text);
  offset = 0; resetTurn();
  try {
    if (mode === 'chat') {
      const base = await (await fetch(`/chat/${sessionId}/events?since=0`)).json();
      offset = base.next_offset;
      await fetch(`/chat/${sessionId}/send`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text})});
    } else {  // task
      const r = await (await fetch('/task', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task:text, max_turns:20})})).json();
      taskId = r.task_id;
      $('#m-provider').textContent = r.model.provider;
      $('#m-model').textContent = r.model.model;
    }
    $('#s-status').textContent = '运行中';
    pollTimer = setInterval(poll, 250);
  } catch (err) { $('#s-status').textContent = '错误:'+err; $('#send-btn').disabled = false; }
});

$('#run-sop').addEventListener('click', async () => {
  const yaml = $('#sop-yaml').value.trim();
  if (!yaml) return;
  $('#messages').innerHTML = ''; resetTurn();
  $('#s-status').textContent = '运行中…（同步）';
  try {
    const r = await (await fetch('/run', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({sop_yaml:yaml})})).json();
    $('#s-status').textContent = r.success ? '完成 ✓' : '完成 ✗';
    const steps = (r.steps||[]).map(s => `step ${s.step_id}: ${s.status}, ${s.turns} turns`).join('\n');
    addMsg('assistant', '### SOP Trace\n```\n' + steps + '\n```');
  } catch (e) { $('#s-status').textContent = '错误:'+e; }
});

async function poll() {
  let res;
  try { res = await (await fetch((mode==='chat'?`/chat/${sessionId}`:`/task/${taskId}`) + `/events?since=${offset}`)).json(); }
  catch (e) { return; }
  for (const ev of res.events) {
    offset = res.next_offset;
    if (ev.type === 'reasoning') { appendReasoning(ev.delta); }
    else if (ev.type === 'token') { appendToken(ev.delta); }
    else if (ev.type === 'turn') { endTurn(); turns = (ev.turn||0)+1; updateStats(); }
    else if (ev.type === 'tool') { addToolToGroup(ev.name, ev.ok, ev.result); toolsTotal++; toolCounts[ev.name]=(toolCounts[ev.name]||0)+1; updateStats(); }
    else if (ev.type === 'approval') { addApproval(ev); }
    else if (ev.type === 'done') {
      endTurn();
      $('#s-status').textContent = '空闲';
      $('#send-btn').disabled = false;
      clearInterval(pollTimer); pollTimer = null;
      const tr = ev.trace; if (tr && tr.duration) {}  // task mode trace
    }
    else if (ev.type === 'error') { addMsg('assistant', '⚠️ '+ev.message); }
  }
  const finished = mode==='chat' ? (!res.running && !res.pending) : (res.done && !res.pending);
  if (finished && pollTimer) { clearInterval(pollTimer); pollTimer=null; $('#send-btn').disabled=false; if($('#s-status').textContent==='运行中') $('#s-status').textContent='空闲'; }
}

function resetTurn() { endTurn(); if (curToolGroup) { curToolGroup=null; curToolList=null; } }

function ensureAssistant() {
  if (!curAssistant) {
    curAssistant = document.createElement('div'); curAssistant.className='msg assistant';
    const tag = document.createElement('div'); tag.className='role-tag'; tag.textContent='assistant';
    const bub = document.createElement('div'); bub.className='bubble streaming';
    curAssistant.appendChild(tag); curAssistant.appendChild(bub);
    curReasoningEl = null; curReasoning = ''; curText = '';
    $('#messages').appendChild(curAssistant);
  }
}
function appendToken(delta) { ensureAssistant(); curText += delta; curAssistant.querySelector('.bubble').innerHTML = marked.parse(curText); scrollBottom(); }
function appendReasoning(delta) {
  ensureAssistant();
  if (!curReasoningEl) { curReasoningEl = document.createElement('div'); curReasoningEl.className='reasoning'; curReasoning=''; curAssistant.insertBefore(curReasoningEl, curAssistant.querySelector('.bubble')); }
  curReasoning += delta; curReasoningEl.textContent = curReasoning; scrollBottom();
}
function endTurn() {
  if (curAssistant) {
    curAssistant.querySelector('.bubble').classList.remove('streaming');
    if (curReasoningEl && !curReasoning) curReasoningEl.remove();
    curAssistant = null; curText = ''; curReasoning = ''; curReasoningEl = null;
  }
}

// tool group: one collapsed box per turn holding all tool calls
function ensureToolGroup() {
  if (!curToolGroup) {
    curToolGroup = document.createElement('div'); curToolGroup.className='tool-group';
    const h = document.createElement('div'); h.className='tool-group-header';
    h.innerHTML = `<span class="icon">🔧</span><span class="title">工具调用</span><span class="count">0 次</span><span class="arrow">▶</span>`;
    h.onclick = () => curToolGroup.classList.toggle('expanded');
    curToolList = document.createElement('div'); curToolList.className='tool-list';
    curToolGroup.appendChild(h); curToolGroup.appendChild(curToolList);
    $('#messages').appendChild(curToolGroup);
  }
  return curToolList;
}
function addToolToGroup(name, ok, result) {
  endTurn();
  const list = ensureToolGroup();
  const item = document.createElement('div'); item.className='tool-item';
  item.innerHTML = `<span class="icon">${TOOL_ICONS[name]||'⚙️'}</span><span class="name">${name}</span><span class="status ${ok?'ok':'fail'}">${ok?'✓':'✗'}</span>`;
  if (result) {
    const det = document.createElement('div'); det.className='tool-detail'; det.innerHTML = `<pre>${(result||'').slice(0,2000)}</pre>`;
    item.appendChild(det);
    item.onclick = (e) => { e.stopPropagation(); item.classList.toggle('expanded'); };
  }
  list.appendChild(item);
  const cnt = list.children.length;
  curToolGroup.querySelector('.count').textContent = cnt + ' 次';
  scrollBottom();
}

function addMsg(role, text) {
  endTurn();
  const div = document.createElement('div'); div.className='msg '+role;
  const tag = document.createElement('div'); tag.className='role-tag'; tag.textContent = role==='user'?'你':'assistant';
  const bub = document.createElement('div'); bub.className='bubble';
  bub.innerHTML = role==='assistant' ? marked.parse(text) : ''; 
  if (role==='user') bub.textContent = text;
  div.appendChild(tag); div.appendChild(bub);
  $('#messages').appendChild(div); scrollBottom();
}
function addApproval(ev) {
  endTurn();
  const div = document.createElement('div'); div.className='approval';
  div.innerHTML = `<div class="reason">⚠️ 需审批: ${ev.reason}</div><pre>${JSON.stringify(ev.payload,null,2)}</pre>`;
  const url = mode==='chat' ? `/chat/${sessionId}/approve` : `/task/${taskId}/approve`;
  const mk = (label, decision, cls) => { const b=document.createElement('button'); b.className=cls; b.textContent=label; b.onclick=()=>{fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:`{"decision":"${decision}"}`});div.remove();}; return b; };
  div.appendChild(mk('本次允许','once','yes'));
  div.appendChild(mk('对话允许','always','yes'));
  div.appendChild(mk('拒绝','reject','no'));
  $('#messages').appendChild(div); scrollBottom();
}
function updateStats() {
  $('#s-turns').textContent = turns;
  $('#s-tools-total').textContent = toolsTotal;
  const ts=$('#tool-stats'); ts.innerHTML='';
  const entries=Object.entries(toolCounts).sort((a,b)=>b[1]-a[1]);
  if (!entries.length) { ts.innerHTML='<div class="tool-stat"><span class="name">—</span></div>'; return; }
  for (const [name,count] of entries) { const d=document.createElement('div'); d.className='tool-stat'; d.innerHTML=`<span class="name">${TOOL_ICONS[name]||'⚙️'} ${name}</span><span class="count">×${count}</span>`; ts.appendChild(d); }
}
function scrollBottom() { const m=$('#messages'); m.scrollTop=m.scrollHeight; }
</script>
</body>
</html>
